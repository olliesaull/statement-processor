{% extends "base.html" %}
{% block title %}Privacy Policy - Statement Processor{% endblock %}
{% block container_class %}p-0{% endblock %}
{% block content %}
  <header class="page-header page-header-hero">
    <div class="container">
      <p class="section-kicker reveal">Privacy Policy</p>
      <h1 class="reveal reveal-delay-1">How we handle your data.</h1>
    </div>
  </header>
  <section class="section">
    <div class="container">
      <div class="legal-content">
        {{ content | safe }}
      </div>
    </div>
  </section>
{% endblock %}
