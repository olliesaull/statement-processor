user www-data;
worker_processes auto;
error_log /dev/stderr warn;
pid /run/nginx.pid;

events {
    worker_connections 512;
}

http {
    access_log /dev/stdout;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    types_hash_bucket_size 128;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    proxy_buffering on;
    proxy_buffer_size 16k;
    proxy_buffers 8 64k;
    proxy_busy_buffers_size 128k;
    proxy_connect_timeout 60s;
    proxy_read_timeout 60s;
    proxy_redirect off;
    proxy_send_timeout 60s;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    client_max_body_size 64k;
    client_body_timeout 10s;
    client_header_timeout 10s;

    # Hardening
    proxy_hide_header X-Powered-By;
    fastcgi_hide_header X-Powered-By;
    server_tokens off;

    # Extract real client IP from X-Forwarded-For (first IP in chain)
    map $http_x_forwarded_for $real_client_ip {
        ~^([^,\s]+) $1;
        default $remote_addr;
    }

    # Rate limiting: 20 req/s per real client IP
    # Note: /healthz (AppRunner health checks) is subject to the same rate limit.
    # This matches the Dexero pattern. If health check failures appear during
    # scaling events, consider adding a separate zone or exemption for /healthz.
    limit_req_zone $real_client_ip zone=general:10m rate=20r/s;
    limit_req_status 429;
    limit_req_log_level warn;

    upstream gunicorn {
        server unix:/tmp/flask.sock;
    }

    server {
        listen 8080 default_server;
        listen [::]:8080;
        server_name _;
        absolute_redirect off;

        # Plain-text error pages (no Nginx HTML)
        error_page 400 = @error_400;
        error_page 401 = @error_401;
        error_page 403 = @error_403;
        error_page 404 = @error_404;
        error_page 405 = @error_405;
        error_page 408 = @error_408;
        error_page 413 = @error_413;
        error_page 414 = @error_414;
        error_page 429 = @error_429;
        error_page 500 = @error_500;
        error_page 502 = @error_502;
        error_page 503 = @error_503;
        error_page 504 = @error_504;

        # Using default_type instead of add_header Content-Type avoids breaking
        # server-level security header inheritance (add_header in a location
        # block silently clears all parent add_header directives).
        location @error_400 { default_type text/plain; return 400 "Bad Request\n"; }
        location @error_401 { default_type text/plain; return 401 "Unauthorized\n"; }
        location @error_403 { default_type text/plain; return 403 "Forbidden\n"; }
        location @error_404 { default_type text/plain; return 404 "Not Found\n"; }
        location @error_405 { default_type text/plain; return 405 "Method Not Allowed\n"; }
        location @error_408 { default_type text/plain; return 408 "Request Timeout\n"; }
        location @error_413 { default_type text/plain; return 413 "Request Too Large\n"; }
        location @error_414 { default_type text/plain; return 414 "URI Too Long\n"; }
        location @error_429 { default_type text/plain; return 429 "Too Many Requests\n"; }
        location @error_500 { default_type text/plain; return 500 "Internal Server Error\n"; }
        location @error_502 { default_type text/plain; return 502 "Bad Gateway\n"; }
        location @error_503 { default_type text/plain; return 503 "Service Unavailable\n"; }
        location @error_504 { default_type text/plain; return 504 "Gateway Timeout\n"; }

        # CLOUDFRONT_PROTECTION_MARKER

        # Block header injection attempts (CRLF / null bytes)
        if ($http_user_agent ~ "[\r\n\0]") {
            return 400;
        }

        if ($http_referer ~ "[\r\n\0]") {
            return 400;
        }

        # Block empty User-Agent (common with bots)
        if ($http_user_agent = "") {
            return 403;
        }

        # Block oversized User-Agent headers
        if ($http_user_agent ~ ".{500,}") {
            return 400;
        }

        # Block request smuggling attempts (duplicate Content-Length)
        if ($http_content_length ~ ",") {
            return 400;
        }

        # Block suspicious Authorization headers
        if ($http_authorization ~ "[\r\n\0]") {
            return 400;
        }

        # Block XSS in X-Forwarded-For
        if ($http_x_forwarded_for ~* "(<script|javascript:|vbscript:)") {
            return 400;
        }

        # Rate limiting: burst=50, delay after 20
        limit_req zone=general burst=50 delay=20;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;
        add_header Content-Security-Policy "
            default-src 'self';
            script-src 'self'
                'unsafe-inline';
            style-src 'self'
                'unsafe-inline';
            font-src 'self';
            img-src 'self'
                data:;
            connect-src 'self';
            frame-src 'none';
            object-src 'none';
            base-uri 'self';
        " always;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), usb=(), bluetooth=(), payment=(), accelerometer=(), gyroscope=(), magnetometer=()" always;

        # Static files — conditional on environment
        # start.sh replaces this block with 403 when STAGE=prod
        # CLOUDFRONT_SERVE_STATIC_START
        location /static/ {
            alias /app/static/;
        }
        # CLOUDFRONT_SERVE_STATIC_END

        # No favicon file exists — return 204 to match current Flask behaviour
        location = /favicon.ico {
            return 204;
        }

        # Auto-generated Flask route location blocks
        include nginx-routes.conf;

        # Chrome DevTools probes and similar
        location ~^\/.well-known\/ {
            return 204;
        }

        # Source map requests
        location ~* \.map$ {
            return 204;
        }

        # Catch-all: anything not explicitly routed is 404
        location / {
            error_log stderr warn;
            return 404;
        }
    }
}
